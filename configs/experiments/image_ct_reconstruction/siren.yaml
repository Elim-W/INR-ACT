task: image_ct_reconstruction
method: siren
dataset: div2k
data_root: data/validation
image_indices: [214]
downscale: 4
device: auto

model:
  in_features: 2
  hidden_features: 256
  hidden_layers: 3
  out_features: 1            # ← grayscale
  outermost_linear: true
  first_omega_0: 30.0
  hidden_omega_0: 30.0

training:
  lr: 2.0e-4
  num_epochs: 2000
  scheduler: cosine
  log_every: 100
  save_every: 500
  proj: 150                   # number of CT projection angles, INCODE default

output:
  save_dir: results/image_ct_reconstruction/siren
  save_model: true
  save_images: true
