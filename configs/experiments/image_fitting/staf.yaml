task: image_fitting
method: staf
dataset: kodak
data_root: data/kodak
image_indices: [3]   # null=all 24; [1] = only kodim01; [1,3,5] = subset
device: auto

model:
  in_features: 2
  hidden_features: 256
  hidden_layers: 3
  out_features: 3
  outermost_linear: true
  first_omega_0: 30.0
  hidden_omega_0: 30.0
  tau: 5           # number of sinusoidal components per layer
  skip_conn: false # residual connection in hidden layers

training:
  lr: 1.0e-4
  num_epochs: 500
  batch_size: -1
  scheduler: cosine
  log_every: 100
  save_every: 500

output:
  save_dir: results/image_fitting/staf
  save_model: true
  save_images: true
