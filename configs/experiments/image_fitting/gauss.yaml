task: image_fitting
method: gauss
dataset: kodak
data_root: data/kodak
image_indices: null   # null=all 24; [1] = only kodim01; [1,3,5] = subset
device: auto

model:
  in_features: 2
  hidden_features: 256
  hidden_layers: 3
  out_features: 3
  outermost_linear: true
  scale: 10.0              # Gaussian bandwidth: exp(-(scale * Wx)^2)

training:
  lr: 1.0e-3
  num_epochs: 2000
  batch_size: -1
  scheduler: cosine
  log_every: 100
  save_every: 500

output:
  save_dir: results/image_fitting/gauss
  save_model: true
  save_images: true
