task: image_fitting
method: sl2a
dataset: kodak
data_root: data/kodak
image_indices: null   # null=all 24; [1] = only kodim01; [1,3,5] = subset

image_indices: [2]
device: auto

model:
  in_features: 2
  hidden_features: 256
  hidden_layers: 3
  out_features: 3
  outermost_linear: true
  degree: 256            # Chebyshev polynomial degree for first KAN layer
  rank: 128              # low-rank factorization rank for hidden layers
  init_method: xavier_uniform        # ChebyKAN weight init
  linear_init_type: kaiming_uniform  # LowRankReLU weight init
  nonlinearity: relu

training:
  lr: 1.0e-3
  num_epochs: 50000
  batch_size: 16384  # 8K pixels per batch
  scheduler: cosine
  log_every: 100
  save_every: 500

output:
  save_dir: results/image_fitting/sl2a
  save_model: true
  save_images: true
