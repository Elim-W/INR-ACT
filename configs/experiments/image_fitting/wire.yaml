task: image_fitting
method: wire
dataset: kodak
data_root: data/kodak
image_indices: null   # null=all 24; [1] = only kodim01; [1,3,5] = subset
device: auto

model:
  in_features: 2
  # Effective hidden width before sqrt(2) reduction inside WIRE
  hidden_features: 300     # → ~212 complex neurons ≈ 256 real-equiv
  hidden_layers: 3
  out_features: 3
  outermost_linear: true
  first_omega_0: 20.0      # Gabor sinusoid frequency (first layer)
  hidden_omega_0: 20.0     # Gabor sinusoid frequency (hidden layers)
  scale: 10.0              # Gabor Gaussian width (sigma_0)

training:
  lr: 5.0e-3
  num_epochs: 2000
  batch_size: -1
  scheduler: lambda        # decay lr to 0.1× over training
  log_every: 100
  save_every: 500

output:
  save_dir: results/image_fitting/wire
  save_model: true
  save_images: true
