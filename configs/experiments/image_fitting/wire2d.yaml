task: image_fitting
method: wire2d
dataset: kodak
data_root: data/kodak
image_indices: null   # null=all 24; [1] = only kodim01; [1,3,5] = subset
device: auto

model:
  in_features: 2
  hidden_features: 512     # → 256 complex neurons (halved inside WIRE2D)
  hidden_layers: 3
  out_features: 3
  outermost_linear: true
  first_omega_0: 10.0
  hidden_omega_0: 10.0
  scale: 10.0

training:
  lr: 5.0e-3
  num_epochs: 2000
  batch_size: -1
  scheduler: lambda
  log_every: 100
  save_every: 500

output:
  save_dir: results/image_fitting/wire2d
  save_model: true
  save_images: true
