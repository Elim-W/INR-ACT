task: image_fitting
method: finer
dataset: kodak
data_root: data/kodak
image_indices: null   # null=all 24; [1] = only kodim01; [1,3,5] = subset
device: auto

model:
  in_features: 2
  hidden_features: 256
  hidden_layers: 3
  out_features: 3
  outermost_linear: true
  first_omega_0: 30.0
  hidden_omega_0: 30.0
  # first_bias_scale: null  # set to a float (e.g. 10.0) to widen first-layer bias range
  first_bias_scale: null
  scale_req_grad: false    # true: backprop through the adaptive scale term

training:
  lr: 1.0e-4
  num_epochs: 2000
  batch_size: -1
  scheduler: cosine
  log_every: 100
  save_every: 500

output:
  save_dir: results/image_fitting/finer
  save_model: true
  save_images: true
