task: image_fitting
method: siren
dataset: div2k
data_root: data/div2k
# Which images to run (1-based index, corresponds to kodim01.png … kodim24.png)
# Each image trains its own independent model; results are reported per-image
# and averaged at the end (mean ± std PSNR/SSIM printed in the summary).
#
#   null        → run all 24 images
#   [1]         → only kodim01  (quick sanity check)
#   [1, 2, 3]   → first 3 images
#   [1, 5, 10, 15, 20, 24]  → sparse subset for a fast benchmark
image_indices: [100]
device: auto   # auto | cpu | cuda | cuda:0

model:
  in_features: 2
  hidden_features: 256
  hidden_layers: 5
  out_features: 3
  outermost_linear: true
  first_omega_0: 30.0
  hidden_omega_0: 30.0

training:
  lr: 1.0e-4
  num_epochs: 50000
  batch_size: -1          # -1 = full image; positive int = random pixel subset
  scheduler: cosine       # cosine | lambda | none
  log_every: 100
  save_every: 500

output:
  save_dir: results/image_fitting/siren
  save_model: true
  save_images: true
