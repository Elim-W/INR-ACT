task: shape_occupancy
method: finer
dataset: stanford_3d
data_root: data/stanford_3d_models
mesh_ids: [bunny, dragon]
device: auto

dataset_kwargs:
  grid_res: 64
  chunk_points: 4096

model:
  in_features: 3
  hidden_features: 256
  hidden_layers: 3
  out_features: 1
  first_omega_0: 30.0
  hidden_omega_0: 30.0
  first_bias_scale: null
  scale_req_grad: false

training:
  lr: 5.0e-4
  num_epochs: 200
  batch_size: 65536
  scheduler: cosine
  log_every: 20
  iou_threshold: 0.5

output:
  save_dir: results/shape_occupancy/finer
  save_model: true
  save_images: true
