task: shape_occupancy
method: wire
dataset: stanford_3d
data_root: data/stanford_3d_models
mesh_ids: [bunny, dragon]
device: auto

dataset_kwargs:
  grid_res: 64
  chunk_points: 4096

model:
  in_features: 3
  hidden_features: 300
  hidden_layers: 3
  out_features: 1
  outermost_linear: true
  first_omega_0: 20.0
  hidden_omega_0: 20.0
  scale: 10.0

training:
  lr: 5.0e-3
  num_epochs: 200
  batch_size: 65536
  scheduler: lambda
  lambda_decay: 0.1
  log_every: 20
  iou_threshold: 0.5

output:
  save_dir: results/shape_occupancy/wire
  save_model: true
  save_images: true
