task: nerf
method: finer
dataset: blender_nerf
data_root: data/blender_nerf
scenes: [lego]
device: auto

dataset_kwargs:
  downscale: 4
  trainskip: 4

model:
  num_layers: 4
  hidden_dim: 182
  geo_feat_dim: 182
  num_layers_color: 4
  hidden_dim_color: 182
  first_omega_0: 30.0
  hidden_omega_0: 30.0
  first_bias_scale: null    # or 10.0 to widen first-layer bias
  scale_req_grad: false

training:
  lr: 2.0e-4
  num_iters: 37500          # FINER paper setting for 25-image protocol
  num_rays: 4096
  fp16: true
  cuda_ray: true
  eval_interval: 50
  scale: 0.8
  bound: 1.0
  dt_gamma: 0.0
  min_near: 0.2
  density_thresh: 10
  bg_radius: -1

output:
  save_dir: results/nerf/finer
  save_model: true
  save_images: true
