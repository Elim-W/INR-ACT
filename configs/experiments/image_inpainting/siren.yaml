task: image_inpainting
method: siren
dataset: kodak
data_root: data/kodak
image_indices: [1]
device: auto

model:
  in_features: 2
  hidden_features: 256
  hidden_layers: 3
  out_features: 3
  outermost_linear: true
  first_omega_0: 30.0
  hidden_omega_0: 30.0

training:
  lr: 1.0e-4
  num_epochs: 2000
  batch_size: -1          # -1 = use all kept pixels every step
  scheduler: cosine
  log_every: 100
  save_every: 500
  sampling_ratio: 0.2     # fraction of pixels kept for training (INCODE default)
  mask_seed: 0

output:
  save_dir: results/image_inpainting/siren
  save_model: true
  save_images: true
