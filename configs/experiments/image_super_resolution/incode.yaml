task: image_super_resolution
method: incode
dataset: kodak
data_root: data/kodak
image_indices: [1]
device: auto

model:
  in_features: 2
  hidden_features: 256
  hidden_layers: 3
  out_features: 3
  outermost_linear: true
  first_omega_0: 30.0
  hidden_omega_0: 30.0
  backbone: resnet34
  truncate_at: 5
  feat_channels: 64
  mlp_hidden_channels: [64, 32, 4]
  mlp_bias: 0.3120

training:
  lr: 9.0e-4
  num_epochs: 2000
  batch_size: -1
  scheduler: lambda
  lambda_decay: 0.1
  log_every: 100
  save_every: 500
  scale_factor: 4
  eval_epoch: 400

output:
  save_dir: results/image_super_resolution/incode
  save_model: true
  save_images: true
