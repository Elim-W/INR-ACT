signal: 2d_sierpinski
seeds: [1234]
iters: 20000
eval_every: 100
batch_size: 65536        # mini-batch for all methods

methods:
  siren:
    hidden_features: 256
    hidden_layers: 3
    first_omega_0: 30.0
    hidden_omega_0: 30.0
    lr: 1.0e-4
    scheduler: lambda

  wire:
    hidden_features: 300
    hidden_layers: 2
    first_omega_0: 15.0
    hidden_omega_0: 15.0
    scale: 10.0
    lr: 1.0e-4
    scheduler: lambda

  gauss:
    hidden_features: 256
    hidden_layers: 3
    scale: 10.0
    lr: 1.0e-4
    scheduler: lambda

  finer:
    hidden_features: 256
    hidden_layers: 3
    first_omega_0: 30.0
    hidden_omega_0: 30.0
    lr: 1.0e-4
    scheduler: lambda

  gf:
    hidden_features: 256
    hidden_layers: 3
    scale: 3.0
    omega: 10.0
    first_bias_scale: 1.0
    lr: 1.0e-4
    scheduler: lambda

  wf:
    hidden_features: 300
    hidden_layers: 3
    scale: 2.0
    omega_w: 4.0
    omega: 5.0
    first_bias_scale: 1.0
    lr: 1.0e-4
    scheduler: lambda

  staf:
    hidden_features: 256
    hidden_layers: 3
    first_omega_0: 30.0
    hidden_omega_0: 30.0
    tau: 5
    skip_conn: false
    lr: 1.0e-4
    scheduler: lambda

  pemlp:
    hidden_features: 256
    hidden_layers: 3
    lr: 5.0e-4
    scheduler: lambda

  incode:
    hidden_features: 256
    hidden_layers: 3
    lr: 1.0e-4
    scheduler: lambda

  sl2a:
    hidden_features: 256
    hidden_layers: 3
    degree: 256
    rank: 128
    init_method: xavier_uniform
    linear_init_type: kaiming_uniform
    nonlinearity: relu
    lr: 1.0e-4
    scheduler: lambda
