task: image_fitting
method: sl2a
dataset: div2k
data_root: data/div2k
image_indices: [2]
device: auto
model:
  in_features: 2
  hidden_features: 256
  hidden_layers: 3
  out_features: 3
  degree: 128
  rank: 128
  init_method: xavier_uniform
  linear_init_type: kaiming_uniform
  nonlinearity: relu

training:
  num_epochs: 4000
  batch_size: -1
  scheduler: cosine
  log_every: 100
  save_every: 500
  lr: 0.0027340487643555053

output:
  save_dir: results/image_fitting/sl2a
  save_model: true
  save_images: true

