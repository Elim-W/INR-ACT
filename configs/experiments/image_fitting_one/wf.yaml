task: image_fitting
method: wf
dataset: div2k
data_root: data/div2k
image_indices: [2]
device: auto
model:
  in_features: 2
  hidden_features: 256
  hidden_layers: 3
  out_features: 3
  scale: 8.840975299986551
  omega_w: 7.877537366232965
  omega: 4.678878900105737
  first_bias_scale: 1.0072765473476128

training:
  num_epochs: 4000
  batch_size: -1
  scheduler: cosine
  log_every: 100
  save_every: 500
  lr: 0.000291571123810266

output:
  save_dir: results/image_fitting/wf
  save_model: true
  save_images: true

