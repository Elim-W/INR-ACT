task: image_fitting
method: siren
dataset: div2k
data_root: data/div2k
image_indices: [2]
device: auto
model:
  in_features: 2
  hidden_features: 256
  hidden_layers: 3
  out_features: 3
  outermost_linear: true
  first_omega_0: 36.94116732730189
  hidden_omega_0: 52.26655587459307

training:
  num_epochs: 4000
  batch_size: -1
  scheduler: cosine
  log_every: 100
  save_every: 500
  lr: 0.000618252613672973

output:
  save_dir: results/image_fitting/siren
  save_model: true
  save_images: true

