task: image_fitting
method: gauss
dataset: div2k
data_root: data/div2k
image_indices: [2]
device: auto
model:
  in_features: 2
  hidden_features: 256
  hidden_layers: 3
  out_features: 3
  scale: 18.165069011419636

training:
  num_epochs: 4000
  batch_size: -1
  scheduler: cosine
  log_every: 100
  save_every: 500
  lr: 0.00231960924767763

output:
  save_dir: results/image_fitting/gauss
  save_model: true
  save_images: true

