task: image_fitting
method: cosmo
dataset: div2k
data_root: data/div2k
image_indices: [2]
device: auto
model:
  in_features: 2
  hidden_features: 256
  hidden_layers: 3
  out_features: 3
  T_range: [0.5, 5.0]
  c_range: [0.0, 3.0]
  beta0: 0.19040744177597796

training:
  num_epochs: 4000
  batch_size: -1
  scheduler: cosine
  log_every: 100
  save_every: 500
  lr: 0.0027358843178728483

output:
  save_dir: results/image_fitting/cosmo
  save_model: true
  save_images: true

