task: image_fitting
method: pemlp
dataset: div2k
data_root: data/div2k
image_indices: [2]
device: auto
model:
  in_features: 2
  hidden_features: 256
  hidden_layers: 3
  out_features: 3

training:
  num_epochs: 4000
  batch_size: -1
  scheduler: cosine
  log_every: 100
  save_every: 500
  lr: 0.004218922609621385

output:
  save_dir: results/image_fitting/pemlp
  save_model: true
  save_images: true

