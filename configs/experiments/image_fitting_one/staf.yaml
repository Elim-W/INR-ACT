task: image_fitting
method: staf
dataset: div2k
data_root: data/div2k
image_indices: [2]
device: auto
model:
  in_features: 2
  hidden_features: 256
  hidden_layers: 3
  out_features: 3
  tau: 5
  skip_conn: false
  first_omega_0: 28.07951697936898
  hidden_omega_0: 33.02011313874121

training:
  num_epochs: 4000
  batch_size: -1
  scheduler: cosine
  log_every: 100
  save_every: 500
  lr: 0.00978493342754557

output:
  save_dir: results/image_fitting/staf
  save_model: true
  save_images: true

