task: image_denoising
method: incode
dataset: kodak
data_root: data/kodak
image_indices: [1]
device: auto

model:
  in_features: 2
  hidden_features: 256
  hidden_layers: 3
  out_features: 3
  outermost_linear: true
  first_omega_0: 30.0
  hidden_omega_0: 30.0
  # Harmonizer (ResNet encoder) — INCODE denoising paper uses resnet34
  backbone: resnet34
  truncate_at: 5
  feat_channels: 64
  mlp_hidden_channels: [32, 16, 8, 4]
  mlp_bias: 0.0005

training:
  lr: 1.5e-4
  num_epochs: 2000
  batch_size: -1
  scheduler: lambda
  lambda_decay: 0.1
  log_every: 100
  save_every: 500
  noise_type: poisson_gaussian
  noise_tau: 40.0
  noise_readout_snr: 2.0
  noise_seed: 0

output:
  save_dir: results/image_denoising/incode
  save_model: true
  save_images: true
